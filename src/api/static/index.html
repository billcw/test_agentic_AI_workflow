<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local AI Document Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #ececec;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- Top Bar --- */
  #topbar {
    background: #171c25;
    border-bottom: 1px solid #2a2f3e;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  #topbar h1 {
    font-size: 15px;
    font-weight: 600;
    color: #a8b4c8;
    white-space: nowrap;
    margin-right: 8px;
  }

  .bar-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bar-label {
    font-size: 11px;
    color: #6b7280;
    white-space: nowrap;
  }

  select {
    background: #1e2433;
    color: #ececec;
    border: 1px solid #2a2f3e;
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 12px;
    cursor: pointer;
    outline: none;
    max-width: 200px;
  }

  select:focus { border-color: #4f7ef7; }

  button {
    background: #1e2433;
    color: #ececec;
    border: 1px solid #2a2f3e;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }

  button:hover { background: #2a3044; }

  #btn-new-project {
    background: #1a3a5c;
    border-color: #2d5a8e;
    color: #7eb8f7;
  }

  #btn-new-project:hover { background: #1e4570; }

  #upload-label {
    background: #1a3a2a;
    border: 1px solid #2d6e45;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    color: #7ef7b0;
    white-space: nowrap;
    transition: background 0.15s;
  }

  #upload-label:hover { background: #1e4533; }

  #upload-input { display: none; }

  #upload-status {
    font-size: 11px;
    color: #6b7280;
    min-width: 120px;
  }

  /* --- Folder ingest bar --- */
  #folder-bar {
    background: #13181f;
    border-bottom: 1px solid #2a2f3e;
    padding: 7px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  #folder-bar span.bar-label {
    font-size: 11px;
    color: #6b7280;
    white-space: nowrap;
  }

  #folder-path-input {
    flex: 1;
    min-width: 220px;
    max-width: 480px;
    background: #1e2433;
    color: #ececec;
    border: 1px solid #2a2f3e;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    outline: none;
  }

  #folder-path-input:focus { border-color: #4f7ef7; }
  #folder-path-input::placeholder { color: #4f5a6b; }

  #btn-ingest-folder {
    background: #2a1a3a;
    border-color: #5a2d8e;
    color: #c07ef7;
  }

  #btn-ingest-folder:hover { background: #341a50; }
  #btn-ingest-folder:disabled { background: #1e2433; color: #4f5a6b; cursor: not-allowed; }

  .force-label {
    font-size: 11px;
    color: #6b7280;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    white-space: nowrap;
  }

  .force-label input[type="checkbox"] { cursor: pointer; }

  #folder-status {
    font-size: 11px;
    color: #6b7280;
    min-width: 160px;
  }

  /* --- Chat Area --- */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .message {
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }

  .message.user .bubble {
    background: #1e2a3a;
    border: 1px solid #2a3a50;
    border-radius: 12px 12px 4px 12px;
    padding: 10px 14px;
    margin-left: auto;
    max-width: 75%;
    font-size: 14px;
    line-height: 1.5;
    width: fit-content;
  }

  .message.assistant .bubble {
    background: #161b26;
    border: 1px solid #232a38;
    border-radius: 4px 12px 12px 12px;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.6;
  }

  .message-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 5px;
    align-items: center;
  }

  .role-label {
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .intent-badge {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .intent-teach        { background: #1a3a5c; color: #7eb8f7; }
  .intent-troubleshoot { background: #3a1a1a; color: #f77e7e; }
  .intent-check        { background: #1a3a2a; color: #7ef7b0; }
  .intent-lookup       { background: #2a2a1a; color: #f7e07e; }

  /* Confidence badge */
  .confidence-badge {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .confidence-ok  { background: #1a2a1a; color: #7ef7b0; }
  .confidence-low { background: #3a2a00; color: #f7c07e; }
  .confidence-warn-text {
    font-size: 11px;
    color: #f7c07e;
    margin-top: 6px;
    display: block;
  }

  /* History divider */
  .history-divider {
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #3a4255;
    font-size: 11px;
  }

  .history-divider::before,
  .history-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #2a2f3e;
  }

  .sources {
    margin-top: 8px;
    font-size: 11px;
    color: #4f7ef7;
  }

  .sources span {
    background: #1a2440;
    border: 1px solid #2a3a60;
    border-radius: 4px;
    padding: 1px 6px;
    margin-right: 4px;
    display: inline-block;
  }

  /* Answer text formatting */
  .bubble p { margin-bottom: 8px; }
  .bubble strong { color: #c8d8f0; }
  .bubble code {
    background: #0d1117;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #7ef7b0;
  }
  .bubble h1, .bubble h2, .bubble h3 {
    color: #c8d8f0;
    margin: 10px 0 4px 0;
    font-size: 14px;
  }

  /* Thinking indicator */
  .thinking .bubble {
    color: #4f5a6b;
    font-style: italic;
  }

  /* --- Input Bar --- */
  #input-bar {
    background: #171c25;
    border-top: 1px solid #2a2f3e;
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #input-bar textarea {
    flex: 1;
    background: #1e2433;
    color: #ececec;
    border: 1px solid #2a2f3e;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 44px;
    max-height: 160px;
    outline: none;
    line-height: 1.5;
  }

  #input-bar textarea:focus { border-color: #4f7ef7; }

  #btn-send {
    background: #4f7ef7;
    border-color: #4f7ef7;
    color: white;
    padding: 10px 18px;
    font-size: 14px;
    border-radius: 8px;
    height: 44px;
  }

  #btn-send:hover { background: #3d6de0; }
  #btn-send:disabled { background: #2a3044; border-color: #2a3044; color: #4f5a6b; cursor: not-allowed; }

  /* --- Modal --- */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #modal-overlay.visible { display: flex; }

  #modal {
    background: #171c25;
    border: 1px solid #2a2f3e;
    border-radius: 12px;
    padding: 24px;
    width: 340px;
  }

  #modal h2 { font-size: 15px; margin-bottom: 14px; color: #ececec; }

  #modal input {
    width: 100%;
    background: #1e2433;
    color: #ececec;
    border: 1px solid #2a2f3e;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
    margin-bottom: 14px;
  }

  #modal input:focus { border-color: #4f7ef7; }
  .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; }
  #modal-status { font-size: 12px; color: #f77e7e; min-height: 16px; margin-bottom: 8px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0f1117; }
  ::-webkit-scrollbar-thumb { background: #2a2f3e; border-radius: 3px; }
</style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <h1>📄 Doc Assistant</h1>
  <div class="bar-group">
    <span class="bar-label">Project</span>
    <select id="project-select"><option>Loading...</option></select>
    <button id="btn-new-project">+ New</button>
  </div>
  <div class="bar-group">
    <span class="bar-label">Router model</span>
    <select id="router-model-select"><option>Loading...</option></select>
  </div>
  <div class="bar-group">
    <span class="bar-label">Reasoning model</span>
    <select id="reasoning-model-select"><option>Loading...</option></select>
  </div>
  <div class="bar-group">
    <span class="bar-label">Candidates (top_k)</span>
    <input type="number" id="top-k-input" min="5" max="50" value="15" style="width:60px">
  </div>
  <div class="bar-group">
    <span class="bar-label">Chunks to agent (top_k_final)</span>
    <input type="number" id="top-k-final-input" min="1" max="50" value="10" style="width:60px">
  </div>
  <div class="bar-group">
    <label id="upload-label">⬆ Upload Files
      <input type="file" id="upload-input" multiple>
    </label>
    <span id="upload-status"></span>
  </div>
</div>

<!-- Folder Ingest Bar -->
<div id="folder-bar">
  <span class="bar-label">📁 Ingest folder</span>
  <input type="text" id="folder-path-input"
         placeholder="/absolute/path/to/folder">
  <label class="force-label">
    <input type="checkbox" id="force-reingest"> re-ingest already indexed
  </label>
  <button id="btn-ingest-folder">Ingest Folder</button>
  <span id="folder-status"></span>
</div>

<!-- Chat Area -->
<div id="chat-area"></div>

<!-- Input Bar -->
<div id="input-bar">
  <textarea id="query-input" placeholder="Ask a question about your documents..." rows="1"></textarea>
  <button id="btn-send">Send</button>
</div>

<!-- New Project Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Create New Project</h2>
    <input type="text" id="modal-input" placeholder="project-name (lowercase, hyphens ok)">
    <div id="modal-status"></div>
    <div class="modal-buttons">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-confirm" style="background:#1a3a5c;border-color:#2d5a8e;color:#7eb8f7;">Create</button>
    </div>
  </div>
</div>

<script>
// --- State ---
let currentProject = null;
let sessionIds = {};

function loadPref(key, fallback) {
  try { return localStorage.getItem(key) || fallback; } catch { return fallback; }
}
function savePref(key, value) {
  try { localStorage.setItem(key, value); } catch {}
}
function getTopK() {
  const val = parseInt(document.getElementById('top-k-input').value);
  const final = parseInt(document.getElementById('top-k-final-input').value);
  if (isNaN(val) || val < 1) return 10;
  if (val < final) {
    alert('Candidates (top_k) must be greater than or equal to Chunks to agent (top_k_final).');
    return null;
  }
  return val;
}
function getTopKFinal() {
  const val = parseInt(document.getElementById('top-k-final-input').value);
  const topk = parseInt(document.getElementById('top-k-input').value);
  if (isNaN(val) || val < 1) return 5;
  if (val > topk) {
    alert('Chunks to agent (top_k_final) must be less than or equal to Candidates (top_k).');
    return null;
  }
  return val;
}
function loadSessionIds() {
  try { return JSON.parse(localStorage.getItem('sessionIds') || '{}'); } catch { return {}; }
}
function saveSessionIds() {
  try { localStorage.setItem('sessionIds', JSON.stringify(sessionIds)); } catch {}
}

// --- Init ---
async function init() {
  sessionIds = loadSessionIds();
  await loadModels();
  await loadProjects();
}

// --- Load models into dropdowns ---
async function loadModels() {
  try {
    const res = await fetch('/models');
    const data = await res.json();
    const models = data.models || [];

    const routerSel = document.getElementById('router-model-select');
    const reasonSel = document.getElementById('reasoning-model-select');

    routerSel.innerHTML = models.map(m =>
      `<option value="${m}">${m}</option>`
    ).join('');

    reasonSel.innerHTML = models.map(m =>
      `<option value="${m}">${m}</option>`
    ).join('');

    const savedRouter = loadPref('router_model', 'gemma4:e4b');
    const savedReason = loadPref('reasoning_model', 'gemma4:31b');

    setSelectValue(routerSel, savedRouter);
    setSelectValue(reasonSel, savedReason);

    routerSel.addEventListener('change', () => savePref('router_model', routerSel.value));
    reasonSel.addEventListener('change', () => savePref('reasoning_model', reasonSel.value));

  } catch(e) {
    console.error('Failed to load models:', e);
  }
}

function setSelectValue(sel, value) {
  for (let opt of sel.options) {
    if (opt.value === value) { sel.value = value; return; }
  }
}

// --- Load projects into dropdown ---
async function loadProjects() {
  try {
    const res = await fetch('/projects');
    const data = await res.json();
    const projects = data.projects || [];

    const sel = document.getElementById('project-select');
    if (projects.length === 0) {
      sel.innerHTML = '<option value="">-- No projects --</option>';
      currentProject = null;
      return;
    }

    sel.innerHTML = projects.map(p =>
      `<option value="${p.name}" ${p.ready ? '' : 'style="color:#6b7280"'}>${p.name}${p.ready ? '' : ' (empty)'}</option>`
    ).join('');

    const saved = loadPref('selected_project', projects[0].name);
    setSelectValue(sel, saved);
    currentProject = sel.value;

    // Load history for the initially selected project
    await loadHistory(currentProject);

    sel.addEventListener('change', async () => {
      currentProject = sel.value;
      savePref('selected_project', currentProject);
      clearChat();
      await loadHistory(currentProject);
    });

  } catch(e) {
    console.error('Failed to load projects:', e);
  }
}

// --- Load and display the most recent session's chat history ---
async function loadHistory(projectName) {
  if (!projectName) return;

  try {
    // Step 1: Get the list of sessions for this project, newest first
    const sessRes = await fetch(`/history/${projectName}/sessions`);
    if (!sessRes.ok) return;
    const sessData = await sessRes.json();
    const sessions = sessData.sessions || [];
    if (sessions.length === 0) return;

    // Step 2: Take the most recent session
    const mostRecent = sessions[0];
    const sessionId = mostRecent.session_id;

    // Step 3: Store it so the next query continues this session
    sessionIds[projectName] = sessionId;
    saveSessionIds();

    // Step 4: Fetch the full message history for that session
    const histRes = await fetch(`/history/${projectName}/${sessionId}`);
    if (!histRes.ok) return;
    const histData = await histRes.json();
    const messages = histData.history || [];
    if (messages.length === 0) return;

    // Step 5: Insert a divider so the user knows this is past history
    const area = document.getElementById('chat-area');
    const divider = document.createElement('div');
    divider.className = 'history-divider';
    divider.textContent = 'Previous session';
    area.appendChild(divider);

    // Step 6: Render each message using the existing appendMessage function.
    // Only show intent/sources/confidence on assistant messages — user rows
    // in the DB have those fields copied from the same turn but they belong
    // to the assistant's response, not the user's question.
    for (const msg of messages) {
      if (msg.role === 'user') {
        appendMessage('user', msg.content, null, null, null);
      } else {
        appendMessage('assistant', msg.content, msg.intent, msg.sources, null);
      }
    }

    // Step 7: Scroll to bottom so the user sees the most recent messages
    area.scrollTop = area.scrollHeight;

  } catch(e) {
    console.error('Failed to load history:', e);
  }
}

// --- Chat rendering ---
function clearChat() {
  document.getElementById('chat-area').innerHTML = '';
}

function appendMessage(role, text, intent, sources, confidence) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const meta = document.createElement('div');
  meta.className = 'message-meta';

  const roleLabel = document.createElement('span');
  roleLabel.className = 'role-label';
  roleLabel.textContent = role === 'user' ? 'You' : 'Assistant';
  meta.appendChild(roleLabel);

  if (intent) {
    const badge = document.createElement('span');
    badge.className = `intent-badge intent-${intent}`;
    badge.textContent = intent;
    meta.appendChild(badge);
  }

  if (confidence !== undefined && confidence !== null) {
    const isLow = confidence <= 2;
    const badge = document.createElement('span');
    badge.className = `confidence-badge ${isLow ? 'confidence-low' : 'confidence-ok'}`;
    badge.textContent = `confidence ${confidence}/5`;
    meta.appendChild(badge);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(text);

  if (confidence !== undefined && confidence !== null && confidence <= 2) {
    const warn = document.createElement('span');
    warn.className = 'confidence-warn-text';
    warn.textContent = '⚠ Low confidence — verify this answer against the source documents before acting.';
    bubble.appendChild(warn);
  }

  if (sources && sources.length > 0) {
    const srcDiv = document.createElement('div');
    srcDiv.className = 'sources';
    srcDiv.innerHTML = '📎 ' + sources.map(s => `<span>${s}</span>`).join('');
    bubble.appendChild(srcDiv);
  }

  div.appendChild(meta);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function formatText(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

// --- Send query ---
async function sendQuery() {
  const input = document.getElementById('query-input');
  const query = input.value.trim();
  if (!query || !currentProject) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('btn-send').disabled = true;

  appendMessage('user', query, null, null, null);

  const thinkingDiv = appendMessage('assistant', 'Thinking...', null, null, null);
  thinkingDiv.classList.add('thinking');

  try {
    const sessionId = sessionIds[currentProject] || null;

    const res = await fetch('/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        project_name: currentProject,
        query: query,
        session_id: sessionId,
        router_model: document.getElementById('router-model-select').value || null,
        reasoning_model: document.getElementById('reasoning-model-select').value || null,
        top_k: getTopK(),
        top_k_final: getTopKFinal()
      })
    });

    const data = await res.json();

    sessionIds[currentProject] = data.session_id;
    saveSessionIds();

    thinkingDiv.remove();
    appendMessage('assistant', data.answer, data.intent, data.sources, data.confidence);

  } catch(e) {
    thinkingDiv.remove();
    appendMessage('assistant', `Error: ${e.message}`, null, null, null);
  }

  document.getElementById('btn-send').disabled = false;
  input.focus();
}

// --- Multi-file upload ---
document.getElementById('upload-input').addEventListener('change', async function() {
  const files = Array.from(this.files);
  if (!files.length || !currentProject) return;

  const status = document.getElementById('upload-status');

  let succeeded = 0;
  let failed = 0;

  for (const file of files) {
    status.textContent = `Uploading ${file.name}...`;
    status.style.color = '#6b7280';

    const form = new FormData();
    form.append('project_name', currentProject);
    form.append('file', file);

    try {
      const res = await fetch('/ingest', { method: 'POST', body: form });
      const data = await res.json();
      if (data.status === 'success' || data.status === 'ingested') {
        succeeded++;
      } else {
        failed++;
        console.warn(`Failed: ${file.name} — ${data.message}`);
      }
    } catch(e) {
      failed++;
      console.warn(`Error: ${file.name} — ${e.message}`);
    }
  }

  if (failed === 0) {
    status.textContent = `✓ ${succeeded} file${succeeded !== 1 ? 's' : ''} ingested`;
    status.style.color = '#7ef7b0';
  } else {
    status.textContent = `✓ ${succeeded} ingested, ✗ ${failed} failed`;
    status.style.color = '#f7c07e';
  }

  this.value = '';
  setTimeout(() => { status.textContent = ''; }, 6000);
});

// --- Folder ingest ---
document.getElementById('btn-ingest-folder').addEventListener('click', async function() {
  const folderPath = document.getElementById('folder-path-input').value.trim();
  const force = document.getElementById('force-reingest').checked;
  const status = document.getElementById('folder-status');

  if (!folderPath) {
    status.textContent = 'Enter a folder path first.';
    status.style.color = '#f77e7e';
    return;
  }

  if (!currentProject) {
    status.textContent = 'Select a project first.';
    status.style.color = '#f77e7e';
    return;
  }

  this.disabled = true;
  status.textContent = 'Scanning folder...';
  status.style.color = '#6b7280';

  try {
    const res = await fetch('/ingest_folder', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        project_name: currentProject,
        folder_path: folderPath,
        force: force
      })
    });

    const data = await res.json();

    if (!res.ok) {
      status.textContent = `✗ ${data.detail || 'Error'}`;
      status.style.color = '#f77e7e';
    } else {
      const parts = [`✓ ${data.ingested} ingested`];
      if (data.skipped > 0) parts.push(`${data.skipped} skipped`);
      if (data.errors > 0)  parts.push(`${data.errors} errors`);
      status.textContent = parts.join(', ');
      status.style.color = data.errors > 0 ? '#f7c07e' : '#7ef7b0';
    }

  } catch(e) {
    status.textContent = `✗ ${e.message}`;
    status.style.color = '#f77e7e';
  }

  this.disabled = false;
});

// --- New project modal ---
document.getElementById('btn-new-project').addEventListener('click', () => {
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-status').textContent = '';
  document.getElementById('modal-overlay').classList.add('visible');
  document.getElementById('modal-input').focus();
});

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('visible');
});

document.getElementById('modal-confirm').addEventListener('click', async () => {
  const name = document.getElementById('modal-input').value.trim();
  if (!name) return;

  const statusEl = document.getElementById('modal-status');
  statusEl.textContent = 'Creating...';
  statusEl.style.color = '#6b7280';

  try {
    const res = await fetch('/projects', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({project_name: name})
    });
    const data = await res.json();

    if (res.ok) {
      document.getElementById('modal-overlay').classList.remove('visible');
      await loadProjects();
      const sel = document.getElementById('project-select');
      setSelectValue(sel, data.name);
      currentProject = data.name;
      savePref('selected_project', currentProject);
      clearChat();
    } else {
      statusEl.textContent = data.detail || 'Error creating project.';
      statusEl.style.color = '#f77e7e';
    }
  } catch(e) {
    statusEl.textContent = e.message;
    statusEl.style.color = '#f77e7e';
  }
});

document.getElementById('modal-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('modal-confirm').click();
  if (e.key === 'Escape') document.getElementById('modal-cancel').click();
});

// --- Input textarea auto-resize + Enter to send ---
const textarea = document.getElementById('query-input');
textarea.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

textarea.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendQuery();
  }
});

document.getElementById('btn-send').addEventListener('click', sendQuery);

// --- Start ---
init();
</script>
</body>
</html>
